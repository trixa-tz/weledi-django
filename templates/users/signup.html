{% extends 'base.html' %}

{% block title %}Sign up | Weledi Press{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 py-12">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900">Create your account</h1>
            <p class="mt-1 text-sm text-slate-500">Join Weledi and never miss a story.</p>
        </div>

        <form method="post" action="{% url 'signup' %}" class="space-y-5" data-validate novalidate>
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" name="username" id="username" required autofocus
                        class="w-full rounded-lg border border-slate-300 pl-10 pr-3.5 py-2.5 text-sm focus:border-brand-600 focus:ring-2 focus:ring-brand-100 outline-none transition">
                </div>
            </div>
            <div>
                <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1.5">Phone <span class="font-normal text-slate-400">(optional)</span></label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/>
                    </svg>
                    <input type="tel" name="phone" id="phone"
                        class="w-full rounded-lg border border-slate-300 pl-10 pr-3.5 py-2.5 text-sm focus:border-brand-600 focus:ring-2 focus:ring-brand-100 outline-none transition">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" name="password" id="password" required
                        class="w-full rounded-lg border border-slate-300 pl-10 pr-3.5 py-2.5 text-sm focus:border-brand-600 focus:ring-2 focus:ring-brand-100 outline-none transition">
                </div>
            </div>
            <div>
                <label for="password2" class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm password</label>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" name="password2" id="password2" required
                        class="w-full rounded-lg border border-slate-300 pl-10 pr-3.5 py-2.5 text-sm focus:border-brand-600 focus:ring-2 focus:ring-brand-100 outline-none transition">
                </div>
            </div>
            <button type="submit"
                class="w-full rounded-lg bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 shadow-sm transition">
                Create account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
            Already have an account? <a href="{% url 'login' %}" class="font-semibold text-brand-600 hover:text-brand-700">Log in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
{% load static %}
<script src="{% static 'js/auth-validation.js' %}"></script>
{% endblock %}
