{% if messages %}
<div class="mb-6 space-y-2">
    {% for message in messages %}
    <div class="flex items-start gap-2.5 rounded-xl px-4 py-3 text-sm font-medium
        {% if message.tags == 'error' %}bg-red-50 text-red-700
        {% elif message.tags == 'success' %}bg-emerald-50 text-emerald-700
        {% else %}bg-brand-50 text-brand-800{% endif %}">
        {% if message.tags == 'success' %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-0.5 shrink-0">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>
        </svg>
        {% else %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-0.5 shrink-0">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        {% endif %}
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
