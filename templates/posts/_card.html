<a href="{% url 'post_detail' post.id %}" class="group flex flex-col bg-white rounded-xl border border-slate-200 hover:border-slate-300 hover:shadow-lg hover:shadow-slate-200/60 transition duration-200 p-5">
    <div class="flex items-center gap-2 text-xs text-slate-400">
        <span class="font-semibold uppercase tracking-wide text-brand-600">News</span>
        <span class="text-slate-300">&bull;</span>
        <time>{{ post.created|date:"M j, Y" }}</time>
    </div>
    <h3 class="mt-2 font-serif text-xl font-bold text-slate-900 leading-snug group-hover:text-brand-700 transition line-clamp-3">{{ post.title }}</h3>
    <p class="mt-2 text-sm text-slate-600 leading-relaxed line-clamp-2 flex-1">{{ post.body }}</p>
    <span class="mt-4 inline-flex items-center gap-1 text-xs font-semibold text-brand-600">
        Read more
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 transition-transform group-hover:translate-x-0.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </span>
</a>
