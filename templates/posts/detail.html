{% extends 'base.html' %}

{% block title %}{{ post.title }} | Weledi News{% endblock %}

{% block content %}
<article class="max-w-3xl mx-auto px-4 sm:px-6 py-10">
    <a href="{% url 'post_list' %}" class="inline-flex items-center gap-1.5 text-sm font-semibold text-brand-600 hover:text-brand-700 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
            <path d="m12 19-7-7 7-7M19 12H5"/>
        </svg>
        Back to news
    </a>

    <div class="flex items-center gap-2 text-xs text-slate-400 mb-3">
        <span class="inline-flex items-center gap-1.5 font-semibold uppercase tracking-wide text-brand-700 bg-brand-50 px-2.5 py-1 rounded-full">News</span>
        <time>{{ post.created|date:"M j, Y · g:i A" }}</time>
    </div>

    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-slate-900 leading-tight">{{ post.title }}</h1>

    <div class="mt-6 text-slate-700 leading-relaxed whitespace-pre-line text-[1.05rem]">{{ post.body }}</div>

</article>
{% endblock %}
